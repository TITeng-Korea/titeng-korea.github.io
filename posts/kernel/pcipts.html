<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PCI PTS</title>
  <style>
    :root {
      --bg: #606777;
      --slide: #ffffff;
      --ink: #111111;
      --muted: #6f6f6f;
      --line: #646464;
      --border: #222222;
      --card: #eeeeee;
      --card2: #f6f6f6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 38%),
        linear-gradient(180deg, #6a7180 0%, #596171 100%);
      color: var(--ink);
      font-family: Arial, "Noto Sans KR", "Malgun Gothic", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .deck {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 72px;
    }

    .slide {
      display: none;
      position: relative;
      width: min(1420px, calc(100vw - 160px));
      aspect-ratio: 16 / 9;
      background: var(--slide);
      box-shadow: 0 26px 62px rgba(0, 0, 0, 0.26);
      border: 1px solid rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .slide.active {
      display: block;
    }

    .top-line {
      position: absolute;
      left: 36px;
      right: 36px;
      top: 50px;
      height: 1px;
      background: var(--line);
    }

    .title {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      font-size: clamp(32px, 2.45vw, 50px);
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: -0.06em;
      text-align: center;
      white-space: nowrap;
    }

    .content {
      position: absolute;
      left: 46px;
      right: 46px;
      top: 138px;
      bottom: 42px;
      font-size: clamp(17px, 1.18vw, 23px);
      line-height: 1.4;
    }

    .content.compact {
      font-size: clamp(16px, 1.08vw, 21px);
      line-height: 1.34;
    }

    .slide.compact .content {
      font-size: clamp(16px, 1.05vw, 20px);
      line-height: 1.33;
    }

    .content.tight {
      font-size: clamp(15px, 0.98vw, 18px);
      line-height: 1.28;
    }

    .center {
      text-align: center;
    }

    .muted {
      color: var(--muted);
    }

    .hero {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 0 10%;
    }

    .hero .sub {
      font-size: clamp(28px, 2.8vw, 54px);
      line-height: 1;
      color: #9c9c9c;
      letter-spacing: -0.03em;
      margin: -0.4% 0 0.08em;
      font-weight: 500;
    }

    .hero .main {
      font-size: clamp(50px, 4.1vw, 84px);
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: -0.06em;
      margin: 0;
    }

    .author-table {
      position: absolute;
      left: 50%;
      bottom: 14%;
      transform: translateX(-50%);
      width: min(38%, 640px);
      border-collapse: collapse;
      font-size: clamp(14px, 0.95vw, 17px);
    }

    .author-table td {
      border: 1px solid #bcbcbc;
      padding: 0.46em 0.88em;
      width: 50%;
      text-align: center;
    }

    .grid {
      display: grid;
      gap: 16px;
      align-items: stretch;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .grid-4 .box {
      min-height: 162px;
    }

    .box {
      background: var(--card);
      border: 1.5px solid var(--border);
      padding: 16px 18px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-height: 180px;
    }

    .box.white {
      background: #fff;
    }

    .box-title {
      font-size: clamp(20px, 1.5vw, 27px);
      line-height: 1.15;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.035em;
    }

    .box-body {
      font-size: clamp(16px, 1.05vw, 21px);
      line-height: 1.4;
      color: #232323;
      margin-top: auto;
    }

    .box-body p {
      margin: 0.15em 0;
    }

    .box-body ul,
    .box-body ol {
      margin: 0.2em 0;
      padding-left: 1.2em;
      text-align: left;
    }

    .box-body li {
      margin: 0.15em 0;
    }

    .band {
      margin-top: 18px;
      border: 1.5px solid var(--border);
      background: #f3f3f3;
      padding: 14px 20px;
      font-size: clamp(16px, 1.05vw, 20px);
      line-height: 1.38;
      text-align: center;
    }

    .band.left {
      text-align: left;
    }

    .note {
      margin-top: 12px;
      font-size: clamp(13px, 0.86vw, 15px);
      line-height: 1.35;
      color: #444;
      text-align: center;
    }

    .note.left {
      text-align: left;
    }

    .summary {
      max-width: 1160px;
      margin: 0 auto;
    }

    .summary .kicker {
      font-weight: 700;
      margin-bottom: 0.55em;
    }

    .summary-list {
      margin: 0.2em 0 0.8em 1.2em;
      padding: 0;
    }

    .summary-list li {
      margin: 0.28em 0;
    }

    .closing {
      max-width: 1140px;
      margin: 0 auto;
      font-size: clamp(18px, 1.35vw, 24px);
      line-height: 1.58;
    }

    .closing p {
      margin: 0.85em 0;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .deck {
        padding: 16px;
      }

      .slide {
        width: calc(100vw - 32px);
      }

      .content {
        left: 24px;
        right: 24px;
        top: 132px;
        bottom: 28px;
      }

      .top-line {
        left: 24px;
        right: 24px;
      }

      .grid-2,
      .grid-3,
      .grid-4 {
        grid-template-columns: 1fr;
      }

      .author-table {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="deck" id="deck"></main>

  <script>
    const card = (title, body, extraClass = "") => `
      <div class="box ${extraClass}">
        <div class="box-title">${title}</div>
        <div class="box-body">${body}</div>
      </div>
    `;

    const band = (body, extraClass = "") => `<div class="band ${extraClass}">${body}</div>`;
    const note = (body, extraClass = "") => `<div class="note ${extraClass}">${body}</div>`;
    const bullets = (items) => `<ul>${items.map((item) => `<li>${item}</li>`).join("")}</ul>`;

    const slides = [
      {
        body: `
          <div class="hero">
            <div class="main">PCI PTS</div>
            <div class="sub">보안 평가 및 승인 체계</div>
            <table class="author-table">
              <tr>
                <td>작성자 : 성현진</td>
                <td>tjdguswls01@titeng.co.kr</td>
              </tr>
            </table>
          </div>
        `
      },
      {
        title: "PCI PTS POI는 무엇을 검증하는가",
        className: "compact",
        body: `
          <div class="grid grid-2">
            ${card("POI 장치", `
              <p>POI(Point of Interaction)는 카드 읽기, PIN 입력 등 결제 상호작용을 수행하는 장치이다.</p>
              <p>PCI PTS POI는 이러한 장치가 PIN, Key, Account Data 및 민감 보안 기능을 안전하게 보호하도록 설계·구현되었는지를 평가한다.</p>
            `)}
            ${card("제품 보안 평가", `
              <p>기능 적합성 인증이 아니라 물리 침입, Software 변조, Key·PIN 노출, Interface 악용에 대한 제품 보안 통제를 평가한다.</p>
            `)}
          </div>
          ${band("PCI DSS는 카드계정데이터 환경의 기술·운영 통제를, PCI PTS POI는 결제 단말 및 보안 구성요소의 제품 보안 특성을 다룬다.")}
        `
      },
      {
        title: "누가 어떤 역할을 수행하는가",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("Vendor", `<p>장치 설계, 펌웨어, 키·PIN 처리, 제조·배포 절차와 평가 샘플을 제공한다.</p>`)}
            ${card("PCI-recognized Laboratory", `<p>Security Requirements와 DTR 기준으로 문서 검토, 기능 검증 및 공격 시험을 수행하고 평가 보고서를 작성한다.</p>`)}
            ${card("PCI SSC", `<p>평가 결과와 프로그램 절차를 검토하여 승인 범위를 관리하고 Approved PTS Devices 목록을 공개한다.</p>`)}
          </div>
          ${band("결과 : 승인은 특정 모델, Hardware·Firmware 조합, 신청 기능, 적용 조건 및 상태에 한정된다.")}
        `
      },
      {
        title: "장치 분류와 승인 기능으로 평가 범위를 정한다",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("PIN 입력 장치", `<p>PIN Entry Device와 Encrypting PIN Pad처럼 PIN 입력과 암호화를 수행하는 기능이 핵심 범위이다.</p>`)}
            ${card("무인·통합 장치", `<p>Unattended Payment Terminal과 Integrated POS는 설치 환경과 구성에 따라 물리·운영 위험이 달라진다.</p>`)}
            ${card("선택 기능", `<p>SRED, Open Protocol, Contactless, Secure Card Reader 등 신청 기능에 따라 추가 요구사항이 적용된다.</p>`)}
          </div>
          ${band("모든 장치에 모든 요구사항을 적용하지 않고 제품 기능과 평가 모듈을 먼저 확정한다.")}
        `
      },
      {
        title: "무엇을 보호해야 하는가",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("PIN, Keys", `<p>PIN과 Key는 정의된 보안 경계 안에서 보호되며, 평문 PIN과 비밀키는 필요한 최소 시간만 존재하도록 통제한다.</p>`)}
            ${card("Sensitive Functions", `<p>Sensitive Functions는 Firmware, 보안 설정, Key Loading·Management, 관리자 명령 및 보안 상태의 무결성을 보호한다.</p>`)}
            ${card("Account Data", `<p>데이터의 처리·출력·통제는 장치 분류와 신청 기능에 따라 적용되며, 정의된 보호 범위에서 암호화와 평문 데이터 통제를 강화한다.</p>`)}
          </div>
          ${band("PAN과 Track Data의 보호 범위는 장치가 처리하는 데이터와 신청 기능(SRED, Secure Card Reader 등)에 따라 달라진다.")}
        `
      },
      {
        title: "Security Requirements와 DTR의 관계",
        className: "compact",
        body: `
          <div class="grid grid-2">
            ${card("Security Requirements", `<p>Security Requirements는 장치가 달성해야 할 보안 목표와 요구사항을 정의하며, 적용 범위는 장치 유형과 신청 기능에 따라 결정된다.</p>`)}
            ${card("Derived Test Requirements", `<p>Derived Test Requirements(DTR)는 각 요구사항을 입증하기 위한 증빙, 시험 조건, 공격 시나리오 및 판정 방법을 구체화한다.</p>`)}
          </div>
          ${band("요구사항과 연결된 DTR, Technical FAQ를 함께 보아야 시험 기대치를 이해할 수 있다.")}
        `
      },
      {
        title: "보안 영역은 하나의 체계로 연결",
        className: "compact",
        body: `
          <div class="grid grid-4">
            ${card("Physical Security", "침입, 관찰, Side-Channel, Tamper 대응")}
            ${card("Logical Security", "Software Management, Key Management, PIN Management, SRED")}
            ${card("Interface Security", "외부 포트와 Open Protocol의 인증·암호화·권한 통제")}
            ${card("Life-Cycle Security", "제조, 키 주입 시설, 배송, 변경과 취약점 대응")}
          </div>
          ${band("물리 보안, 논리 보안, Interface 보안, Life-Cycle 통제는 동일한 민감 자산을 서로 다른 공격 경로에서 보호한다.")}
          ${note("※ 위 구분은 발표를 위한 보안 영역 분류이며, PTS 공식 평가 모듈 명칭과 완전히 동일하지 않을 수 있다.")}
        `
      },
      {
        title: "Tamper 보호는 세 가지 방식으로 구성",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("Tamper Evidence", "봉인과 외관 변화처럼 침입 시도가 운영자에게 명확한 흔적으로 남는다.")}
            ${card("Tamper Resistance", "케이스, 차폐, Mesh와 부품 배치가 민감부 접근에 필요한 시간과 기술을 높인다.")}
            ${card("Tamper Detection and Response", "Switch, Mesh와 센서가 침입을 감지하면 키 삭제나 기능 비활성화 같은 반응을 실행한다.")}
          </div>
          ${band("흔적, 저항, 자동 탐지·반응을 제품 위험과 기능에 맞게 조합한다.")}
        `
      },
      {
        title: "Attack Potential은 공격 난이도를 평가",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("공격 자원", "경과 시간, 전문성, 대상 지식, 장비, 접근 조건 및 공격 수행에 필요한 자원을 기준으로 평가한다.")}
            ${card("공격 시나리오", "식별, 준비, 실행 단계의 비용을 합산해 실현 가능한 공격인지 판단한다.")}
            ${card("판정", "적용되는 Attack Potential 기준보다 낮은 공격 자원으로 민감 자산을 침해할 수 있다면 해당 보호 통제는 충분하지 않다.")}
          </div>
          ${band("절대적으로 뚫리지 않는 장치가 아니라 규정된 공격 능력에 견디는 장치를 증명한다.")}
        `
      },
      {
        title: "Side-Channel과 환경 조작도 물리 공격",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("정보 누출", "전력, 전자기파, 타이밍과 오류 반응에서 PIN 또는 키 연산의 단서를 얻으려 한다.")}
            ${card("Fault Injection", "전압, Clock, 온도, Laser 같은 비정상 조건으로 보안 검사를 건너뛰거나 비밀을 노출시킨다.")}
            ${card("Monitoring", "전압·Clock·온도와 보안 센서 상태를 감시하고 허용 범위를 벗어나면 안전 상태로 전환한다.")}
          </div>
          ${band("회로 보호뿐 아니라 측정 결과와 센서 임계값의 근거를 평가 자료로 제시한다.")}
        `
      },
      {
        title: "Software Management가 신뢰 실행",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("Authenticity", "실행 파일과 Firmware가 승인된 주체가 서명한 정식 배포물인지 확인한다.")}
            ${card("Integrity", "부팅과 실행 중 코드, 설정, 보안 데이터가 변조되지 않았는지 검증한다.")}
            ${card("Version Control", "버전 식별, Rollback 통제, 변경 이력과 승인된 Software 목록을 유지한다.")}
          </div>
          ${band("승인되지 않은 Software가 설치되거나 실행되는 경로를 제거한다.")}
        `
      },
      {
        title: "Secure Boot와 Update는 하나",
        className: "compact",
        body: `
          <div class="grid grid-2">
            ${card("Boot Chain", "변경하기 어려운 Root of Trust에서 Bootloader, OS, Application 순서로 서명과 무결성을 검증한다.")}
            ${card("Secure Update", "Update Package의 출처·무결성·버전·대상 장치를 확인하고 실패 시 안전하게 복구하거나 실행을 차단한다.")}
          </div>
          ${band("개발·진단 Interface와 비상 복구 경로도 동일한 인증과 권한 통제를 적용한다.")}
        `
      },
      {
        title: "Key Management는 생성부터 파기까지",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("Key Lifecycle", "생성, 주입, 저장, 사용, 교체, 백업과 파기 단계마다 비밀성과 무결성을 유지한다.")}
            ${card("Separation", "서로 다른 목적의 Key를 분리하고 Dual Control, Split Knowledge와 역할 기반 권한을 적용한다.")}
            ${card("Cryptographic Control", "적용 가능한 PCI 요구사항에 부합하는 승인 알고리즘·Key Type·Key Length 적용")}
          </div>
          ${band("Key가 노출되면 PIN 암호화와 장치 인증 등 여러 보호 계층이 동시에 무너진다.")}
        `
      },
      {
        title: "PIN Management는 입력 순간을 보호",
        className: "compact",
        body: `
          <div class="grid grid-3">
            ${card("Secure Entry", "키 배열, Touch 입력, Display Prompt와 PIN Buffer가 관찰·주입·재사용 공격에 노출되지 않아야 한다.")}
            ${card("Immediate Protection", "입력된 PIN은 승인된 PIN Block 형식으로 즉시 암호화하고 평문 복사본과 잔여 데이터를 제거한다.")}
            ${card("Bypass Prevention", "Non-PIN Prompt, Cancel, Timeout, 오류 경로가 PIN 보호 기능을 우회하거나 값을 노출하지 않아야 한다.")}
          </div>
          ${band("평문 PIN은 필요한 최소 영역과 최소 시간에만 존재한다.")}
        `
      },
      {
        title: "SRED는 정의된 보호 지점에서 계정 데이터의 노출을 통제",
        className: "compact",
        body: `
          <div class="grid grid-3">

    function renderSlide(slide, index) {
      const title = slide.title ? `<h1 class="title">${slide.title}</h1>` : "";
      return `
        <section class="slide ${slide.className || ""}" data-index="${index}">
          <div class="top-line"></div>
          ${title}
          <div class="content ${slide.contentClass || ""}">
            ${slide.body}
          </div>
        </section>
      `;
    }

    const deck = document.getElementById("deck");
    deck.innerHTML = slides.map(renderSlide).join("");

    const slideEls = Array.from(document.querySelectorAll(".slide"));
    let currentIndex = 0;

    function showSlide(index) {
      currentIndex = Math.max(0, Math.min(index, slideEls.length - 1));
      slideEls.forEach((slide, i) => {
        slide.classList.toggle("active", i === currentIndex);
      });
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        if (currentIndex > 0) showSlide(currentIndex - 1);
      }
      if (event.key === "ArrowRight") {
        event.preventDefault();
        if (currentIndex < slideEls.length - 1) showSlide(currentIndex + 1);
      }
    });

    showSlide(0);
  </script>
