<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mastercard Kernel</title>
  <style>
    :root {
      --bg: #5a6272;
      --slide: #ffffff;
      --ink: #111111;
      --muted: #8f8f8f;
      --line: #666666;
      --table-border: #d3d3d3;
      --table-head: #b7b7b7;
      --table-head-dark: #8d8d8d;
      --soft: #f8f8f8;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 38%),
        linear-gradient(180deg, #656d7d 0%, #545d6d 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    .deck {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 104px 48px;
    }

    .viewer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      position: relative;
      display: none;
      width: min(1420px, calc(100vw - 248px));
      aspect-ratio: 16 / 9;
      background: var(--slide);
      overflow: hidden;
      box-shadow: 0 24px 55px rgba(0, 0, 0, 0.26);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .slide.active {
      display: block;
    }

    .top-line {
      position: absolute;
      left: 34px;
      right: 34px;
      top: 52px;
      height: 1px;
      background: var(--line);
    }

    .title {
      position: absolute;
      left: 50%;
      top: 86px;
      transform: translateX(-50%);
      margin: 0;
      font-size: clamp(34px, 2.7vw, 54px);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -0.05em;
      text-align: center;
      white-space: nowrap;
    }

    .content {
      position: absolute;
      left: 64px;
      right: 64px;
      top: 176px;
      bottom: 52px;
      font-size: clamp(17px, 1.25vw, 24px);
      line-height: 1.5;
    }

    .content.tight {
      font-size: clamp(16px, 1.15vw, 22px);
      line-height: 1.42;
    }

    .content.dense {
      font-size: clamp(15px, 1.08vw, 21px);
      line-height: 1.36;
    }

    .content p {
      margin: 0 0 0.75em 0;
    }

    .lead {
      margin-bottom: 0.65em;
    }

    .subhead {
      margin: 0.55em 0 0.35em;
      font-weight: 700;
    }

    .bullets,
    .ordered {
      margin: 0.15em 0 0.85em 0;
      padding-left: 1.25em;
    }

    .bullets li,
    .ordered li {
      margin: 0.24em 0;
    }

    .bullets.tight li,
    .ordered.tight li {
      margin: 0.16em 0;
    }

    .table-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    .table-med {
      width: min(78%, 1060px);
    }

    .table-wide {
      width: min(96%, 1250px);
    }

    th, td {
      border: 1px solid var(--table-border);
      padding: 0.56em 0.7em;
      vertical-align: middle;
      word-break: keep-all;
    }

    thead th {
      background: var(--table-head);
      font-weight: 700;
    }

    .table-dark thead th {
      background: var(--table-head-dark);
    }

    .table-center td,
    .table-center th {
      text-align: center;
    }

    .note {
      font-size: 0.8em;
      color: #333;
      margin-top: 0.55em;
    }

    .small {
      font-size: 0.8em;
    }

    .tiny {
      font-size: 0.72em;
      line-height: 1.3;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 52px;
      align-items: start;
    }

    .two-col .section-title {
      font-weight: 700;
      margin-bottom: 0.25em;
    }

    .flow-text {
      white-space: pre-wrap;
      margin: 0;
      font-size: 0.96em;
      line-height: 1.55;
    }

    .mono {
      font-family: "Consolas", "SFMono-Regular", "Courier New", monospace;
    }

    .hero {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 0 10%;
    }

    .hero .sub {
      margin-top: -2%;
      color: #9f9f9f;
      font-size: clamp(30px, 3vw, 60px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 0.12em;
    }

    .hero .main {
      font-size: clamp(46px, 4.4vw, 88px);
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin: 0;
    }

    .author-table {
      position: absolute;
      left: 50%;
      bottom: 13.5%;
      transform: translateX(-50%);
      width: min(36%, 620px);
      border-collapse: collapse;
      font-size: clamp(13px, 0.92vw, 16px);
    }

    .author-table td {
      border: 1px solid #bdbdbd;
      padding: 0.48em 0.8em;
      text-align: center;
      width: 50%;
    }

    .summary-list {
      margin-top: 0.35em;
      counter-reset: item;
    }

    .summary-list li {
      list-style: decimal;
      margin: 0.35em 0 0.35em 1.25em;
    }

    .state-flow {
      margin-top: 0.3em;
      padding: 0.8em 1em;
      border: 1px solid #d0d0d0;
      background: #fafafa;
    }

    .kicker {
      font-weight: 700;
      margin-top: 0.5em;
    }

    .foot-right {
      text-align: right;
      margin-top: 0.45em;
    }

    .hud {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 5;
      pointer-events: none;
    }

    .counter {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(17, 17, 17, 0.55);
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.02em;
      backdrop-filter: blur(10px);
    }

    .dots {
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      border: 0;
      background: rgba(255, 255, 255, 0.42);
      cursor: pointer;
      padding: 0;
    }

    .dot.active {
      background: #ffffff;
      transform: scale(1.15);
    }

    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
      width: 60px;
      height: 60px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 30px;
      line-height: 1;
      user-select: none;
    }

    .nav-btn:hover {
      background: #fff;
    }

    .nav-btn:active {
      transform: translateY(-50%) scale(0.98);
    }

    .nav-btn.prev {
      left: 28px;
    }

    .nav-btn.next {
      right: 28px;
    }

    .hero-slide .top-line {
      left: 44px;
      right: 44px;
    }

    @media (max-width: 900px) {
      .deck {
        padding: 14px;
      }

      .slide {
        width: calc(100vw - 28px);
      }

      .content {
        left: 24px;
        right: 24px;
        top: 142px;
        bottom: 28px;
        font-size: 15px;
      }

      .top-line {
        left: 24px;
        right: 24px;
      }

      .two-col {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .table-med,
      .table-wide,
      .author-table {
        width: 100%;
      }

      .nav-btn {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }

      .nav-btn.prev {
        left: 10px;
      }

      .nav-btn.next {
        right: 10px;
      }

      .hud {
        bottom: 10px;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="deck" id="deck"></main>

          <p class="lead">단순 결제 흐름 (Mag-stripe 또는 EMV Mode):</p>
          <p class="flow-text mono">Terminal → Reader: ACT Signal (금액 등 전달)
Process S: SELECT → Application 선택

    function renderSlide(slide, index) {
      if (slide.type === "hero") {
        return `
          <section class="slide hero-slide" data-index="${index}">
            <div class="top-line"></div>
            ${slide.body}
          </section>
        `;
      }
      return `
        <section class="slide standard" data-index="${index}">
          <div class="top-line"></div>
          <h1 class="title">${slide.title}</h1>
          <div class="content ${slide.tight ? "tight" : ""} ${slide.dense ? "dense" : ""}">
            ${slide.body}
          </div>
        </section>
      `;
    }

    const deck = document.getElementById("deck");
    deck.innerHTML = `
      <div class="viewer">
        <button class="nav-btn prev" id="prevBtn" aria-label="Previous slide">‹</button>
        <div class="stage" id="stage">
          ${slides.map(renderSlide).join("")}
        </div>
        <button class="nav-btn next" id="nextBtn" aria-label="Next slide">›</button>
      </div>
      <div class="hud" aria-hidden="true">
        <div class="counter" id="counter"></div>
        <div class="dots" id="dots"></div>
      </div>
    `;

    const slideEls = Array.from(document.querySelectorAll(".slide"));
    const dotsEl = document.getElementById("dots");
    const counterEl = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    let currentIndex = 0;

    function sync() {
      slideEls.forEach((el, i) => el.classList.toggle("active", i === currentIndex));
      Array.from(dotsEl.children).forEach((dot, i) => dot.classList.toggle("active", i === currentIndex));
      counterEl.textContent = `${currentIndex + 1} / ${slides.length}`;
    }

    function goTo(index) {
      currentIndex = (index + slides.length) % slides.length;
      sync();
    }

    prevBtn.addEventListener("click", () => goTo(currentIndex - 1));
    nextBtn.addEventListener("click", () => goTo(currentIndex + 1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        goTo(currentIndex - 1);
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        goTo(currentIndex + 1);
      }
    });

    slides.forEach((_, i) => {
      const dot = document.createElement("button");
      dot.type = "button";
      dot.className = "dot";
      dot.setAttribute("aria-label", `Go to slide ${i + 1}`);
      dot.addEventListener("click", () => goTo(i));
      dotsEl.appendChild(dot);
    });

    sync();
  </script>
