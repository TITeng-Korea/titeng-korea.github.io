<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMEX Transaction Flow Analysis</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap");

    :root {
      --bg: #2e3440;
      --slide-bg: #ffffff;
      --panel: #efefef;
      --line: #111111;
      --muted: #6b6b6b;
      --code-bg: #111317;
      --code-fg: #e8edf2;
      --accent: #3f4b64;
      --base-w: 1280;
      --base-h: 720;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
        linear-gradient(180deg, #343b4d 0%, var(--bg) 100%);
      font-family: "Inter", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #111;
    }

    * { box-sizing: border-box; }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .stage {
      width: 1280px;
      height: 720px;
      background: var(--slide-bg);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.36);
      transform-origin: center center;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    .slide {
      position: absolute;
      inset: 0;
      padding: 0 24px 18px;
      overflow: hidden;
      background: #fff;
    }

    .top-rule {
      position: absolute;
      left: 28px;
      right: 28px;
      top: 39px;
      height: 2px;
      background: #111;
    }

    .slide-title {
      margin: 75px 0 0;
      text-align: center;
      font-size: 60px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .slide-title.small {
      font-size: 54px;
    }

    .slide-title.xsmall {
      font-size: 48px;
    }

    .slide-subtitle {
      text-align: center;
      font-size: 22px;
      margin-top: 16px;
      line-height: 1.32;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .title-slide {
      display: grid;
      place-items: center;
      padding-top: 58px;
    }

    .title-card {
      width: 620px;
      text-align: center;
    }

    .author-table {
      width: 620px;
      margin: 56px auto 0;
      border-collapse: collapse;
      font-size: 18px;
      text-align: center;
      table-layout: fixed;
    }

    .author-table td {
      border-top: 2px solid #111;
      border-bottom: 2px solid #111;
      padding: 12px 10px 11px;
    }

    .author-table td + td {
      border-left: 2px solid #111;
    }

    .author-name {
      font-weight: 800;
    }

    .panel-grid {
      display: grid;
      gap: 24px;
      align-items: stretch;
    }

    .cards-3 { grid-template-columns: repeat(3, 1fr); }
    .cards-2 { grid-template-columns: repeat(2, 1fr); }
    .cards-4 { grid-template-columns: repeat(4, 1fr); }

    .slide-header {
      padding-top: 20px;
    }

    .hero-lead {
      margin: 34px auto 0;
      width: min(980px, calc(100% - 120px));
      text-align: left;
      font-size: 22px;
      line-height: 1.42;
      letter-spacing: -0.03em;
    }

    .bullet-stack {
      width: min(1100px, calc(100% - 100px));
      margin: 26px auto 0;
      font-size: 23px;
      line-height: 1.34;
      letter-spacing: -0.03em;
    }

    .bullet-stack .bullet {
      padding: 5px 0;
    }

    .panel {
      border: 2.5px solid var(--line);
      background: var(--panel);
      min-height: 278px;
      padding: 10px 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .panel.tight { min-height: 254px; }
    .panel.tall { min-height: 308px; }
    .panel.centered { align-items: center; }
    .panel.left { align-items: flex-start; }

    .panel-title {
      font-size: 29px;
      line-height: 1.16;
      font-weight: 500;
      text-align: center;
      letter-spacing: -0.04em;
      width: 100%;
    }

    .panel-title.bold {
      font-weight: 800;
    }

    .panel-items {
      margin-top: 34px;
      font-size: 22px;
      line-height: 1.38;
      letter-spacing: -0.03em;
      width: 100%;
      text-align: left;
      padding: 0 8px;
    }

    .panel-items.left {
      margin-top: 34px;
    }

    .panel-items.center {
      text-align: center;
      padding: 0;
    }

    .panel-items .item {
      margin: 0;
      padding: 2px 0;
    }

    .panel-items .item + .item {
      margin-top: 1px;
    }

    .note-box {
      border: 2.5px solid var(--line);
      background: var(--panel);
      padding: 12px 18px 13px;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .note-box.left {
      text-align: left;
    }

    .bottom-note {
      margin-top: 26px;
    }

    .two-col-note-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-top: 42px;
    }

    .two-col-note-layout .panel {
      min-height: 286px;
    }

    .three-col-note-layout {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin-top: 42px;
    }

    .three-col-note-layout .panel {
      min-height: 286px;
    }

    .stack-note {
      margin-top: 24px;
    }

    .wide-note {
      margin-top: 18px;
    }

    .flow-layout {
      margin-top: 36px;
    }

    .flow-grid {
      display: grid;
      grid-template-columns: 1fr 44px 1fr 44px 1fr;
      gap: 0;
      align-items: center;
      margin-bottom: 22px;
    }

    .flow-grid.two-row {
      grid-template-columns: 1fr 44px 1fr;
    }

    .flow-box {
      border: 2.5px solid var(--line);
      background: var(--panel);
      min-height: 90px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 24px;
      line-height: 1.14;
      letter-spacing: -0.03em;
    }

    .flow-arrow {
      height: 0;
      position: relative;
      align-self: center;
      justify-self: center;
      width: 34px;
      height: 22px;
      background: var(--accent);
      clip-path: polygon(0 0, 100% 50%, 0 100%, 14% 50%);
    }

    .flow-arrow.down {
      width: 22px;
      height: 34px;
      clip-path: polygon(50% 100%, 100% 0, 0 0);
      transform: rotate(180deg);
    }

    .decision-layout {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 8px 10px;
      align-items: end;
      margin-top: 34px;
    }

    .decision-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .decision-table th,
    .decision-table td {
      border: 1.8px solid rgba(17, 17, 17, 0.4);
      padding: 22px 12px;
      text-align: center;
      vertical-align: middle;
      background: rgba(255, 255, 255, 0.4);
      font-weight: 500;
    }

    .decision-table th {
      background: #efefef;
      font-weight: 600;
      font-size: 18px;
    }

    .decision-side {
      align-self: end;
      font-size: 18px;
      line-height: 1.26;
      letter-spacing: -0.03em;
      padding-right: 4px;
    }

    .decision-side .label {
      font-weight: 700;
      margin-bottom: 4px;
      display: block;
    }

    .table-layout {
      margin-top: 34px;
    }

    .main-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .main-table th,
    .main-table td {
      border: 1.6px solid rgba(17, 17, 17, 0.28);
      padding: 16px 14px;
      text-align: center;
      vertical-align: middle;
    }

    .main-table th {
      background: #efefef;
      font-size: 18px;
      font-weight: 600;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin-top: 36px;
    }

    .summary-grid.bottom {
      grid-template-columns: repeat(2, 1fr);
      width: calc(100% - 100px);
      margin: 20px auto 0;
    }

    .summary-card {
      min-height: 176px;
      border: 2.5px solid var(--line);
      background: var(--panel);
      padding: 10px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
    }

    .summary-card .title {
      font-size: 24px;
      line-height: 1.18;
      font-weight: 500;
      margin-top: 0;
      letter-spacing: -0.03em;
    }

    .summary-card .text {
      margin-top: 34px;
      font-size: 22px;
      line-height: 1.36;
      letter-spacing: -0.03em;
    }

    .code-layout {
      display: grid;
      grid-template-columns: 1.1fr 0.95fr;
      gap: 24px;
      margin-top: 34px;
      align-items: start;
    }

    .code-layout.two-right {
      grid-template-columns: 0.95fr 1fr;
    }

    .code-box {
      background: #111317;
      color: var(--code-fg);
      border-radius: 2px;
      padding: 10px 14px;
      min-height: 260px;
      font-family: "Consolas", "SFMono-Regular", "Menlo", monospace;
      font-size: 13px;
      line-height: 1.38;
      white-space: pre-wrap;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .stack-right {
      display: grid;
      gap: 14px;
    }

    .small-box {
      border: 2.5px solid var(--line);
      background: var(--panel);
      padding: 10px 16px 14px;
      min-height: 128px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 21px;
      line-height: 1.24;
      letter-spacing: -0.03em;
      white-space: pre-line;
    }

    .small-box.tight {
      min-height: 108px;
    }

    .small-box .title {
      display: block;
      font-size: 26px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .hide {
      display: none !important;
    }

    @media (max-width: 1360px), (max-height: 780px) {
      .stage {
        transform: scale(var(--scale, 1));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <div id="slide-root"></div>
    </div>
  </div>

  <script>
    const slides = [
      {
        layout: "title",
        title: "AMEX",
        subtitle: "Transaction Flow Analysis",
        author: "작성자 : 성현진",
        email: "tjdguswls01@titeng.co.kr"
      },
      {
        layout: "cards2",
        title: "범위",
        cards: [
          { title: "", items: ["카드가 선택된 이후 GPO부터 거래 종료까지의 처리 규칙","카드 Capability와 Reader Capability의 조합 판단","카드 데이터 읽기, ODA, CVM, Risk Management 수행"] },
          { title: "", items: ["카드 Capability와 Reader Capability의 조합 판단","1st GENERATE AC의 AC Type 요청과 CID·AC·SDAD 응답 검증","Outcome, Data Record, UI Request 반환"] }
        ],
        note: "Kernel의 중심 역할은 카드와 Reader 조건을 해석해 올바른 거래 경로를 선택하는 것이다."
      },
      {
        layout: "cards3",
        title: "고유한 특징",
        intro: "",
        cards: [
          { title: "Contactless Mode", items: ["1. EMV Mode", "2. Mag-Stripe Mode"] },
          { title: "AMEX 특화 처리", items: ["1. Modified Terminal Type", "2. Enhanced Contactless Reader Capabilities", "3. Dynamic Reader Limits", "4. Contactless Mobile CVM", "5. CDOL Switch"] },
          { title: "거래 완료 방식", items: ["1. Offline", "2. Partial Online", "3. Delayed Authorisation"] }
        ],
        note: "Kernel은 카드 Capability, Reader Capability, Reader Configuration을 해석해\n허용 가능한 Contactless Mode와 거래 경로를 결정한다."
      },
      {
        layout: "flow3x3",
        title: "전체 거래 흐름",
        rows: [
          ["GPO 및 Mode 결정", "Read Application Data", "Processing\nRestrictions"],
          ["CVM / Mobile CVM", "Terminal Risk\nManagement","1st Terminal Action\nAnalysis"],
          ["1st GENERATE AC", "1st Card Action\nAnalysis", "Offline / Online\nAuthorisation"]
        ],
        note: "TVR, TSI, CVM Results는 거래 중 누적되며,\n카드와 Reader 조건에 따라 다음 단계가 결정된다."
      },
      {
        layout: "decisionTable",
        title: "Contactless Mode 선택",
        table: {
          head: ["카드 지원 Mode", "Reader: EMV Only", "Reader: EMV + Mag-Stripe"],
          body: [
            ["Mag-Stripe Only", "Try Another Interface 또는 End Application", "Mag-Stripe Mode"],
            ["EMV + Mag-Stripe", "EMV Mode", "EMV Mode"]
          ]
        },
        side: ["판단 데이터", "AIP Byte 2 Bit 8", "Terminal Type 9F35", "Contactless Reader Capabilities 9F6D", "Enhanced Contactless Reader Capabilities 9F6E"],
        note: "카드가 EMV Mode와 Mag-Stripe Mode를 모두 지원하고, Reader도 EMV Mode를 지원하면 EMV Mode 거래가 선택된다."
      },
      {
        layout: "cards2",
        title: "EMV Mode와 Mag-Stripe Mode",
        cards: [
          { title: "EMV Mode", items: ["1. AIP, AFL, CDOL, IAC, TAC 기반 처리", "2. SDA 또는 CDA 수행 가능", "3. TC, ARQC, AAC 기반의 EMV 거래", "4. EMV Data Record를 Host에 전달"] },
          { title: "Mag-Stripe Mode", items: ["1. Dynamic Track Data 생성", "2. Track 1 / Track 2 Equivalent Data 사용", "3. CVC3와 Track Data를 반영", "4. Mag-Stripe 인증 흐름으로 처리"] }
        ],
        note: "EMV Mode는 EMV Data 기반 거래이고, Mag-Stripe Mode는 Dynamic Track Data 기반 거래다."
      },
      {
        layout: "cards2",
        title: "CDOL Switch",
        cards: [
          { title: "EMV Mode", items: ["1. Cryptogram Version 01", "2. EMV 거래에 필요한 CDOL 사용", "3. 일반 EMV Data Object를 기반으로 AC 생성"] },
          { title: "Mag-Stripe Mode", items: ["1. Cryptogram Version 02", "2. CDOL 입력은 UN, ATC, CVR로 제한", "3. 생성된 AC와 CVC3를 Dynamic Track Data에 반영"] }
        ],
        note: "CDOL Switch는 AMEX Kernel에서 EMV Mode와 Mag-Stripe Mode를 실제 거래 데이터 수준에서 분리하는 장치다."
      },
      {
        layout: "cards3",
        title: "세 가지 거래 완료 방식",
        cards: [
          { title: "Offline", items: ["1. 카드와 Reader만으로 승인 또는 거절", "2. TC 또는 AAC 반환", "3. Online Processing 없음"] },
          { title: "Partial Online", items: ["1. 1st GENERATE AC 이후 카드와 Reader 통신 종료", "2. ARQC와 Data Record를 Host로 전달", "3. Issuer Response로 최종 Approved 또는 Declined 결정"] },
          { title: "Delayed Authorisation", items: ["1. 실시간 Online Authorisation이 불가능한 환경", "2. Partial Online 구조로 처리", "3. 카드 제거 후 후속 시점에 Issuer Authorisation 수행"] }
        ],
        note: "Online 구조는 Full Online이 아니라 Partial Online이다."
      },
      {
        layout: "cards3",
        title: "GPO는 거래의 시작점",
        cards: [
          { title: "Pre-PDOL Processing", items: ["1. Transaction Data 초기화", "2. 거래 금액, 통화, 거래 유형, 날짜, UN 준비", "3. Reader CVM Required 상태 확인"] },
          { title: "PDOL Processing", items: ["1. 카드가 요청한 Tag 순서대로 값 연결", "2. PDOL이 없으면 83 00 사용", "3. 누락 데이터는 요구된 길이에 맞춰 채움"] },
          { title: "GPO Response", items: ["1. AIP 수신", "2. AFL 수신", "3. Mode, Mobile Transaction 가능 여부 판단"] }
        ],
        note: "GPO는 Reader가 PDOL 데이터를 카드에 전달하고, 카드가 AIP·AFL·Mobile CVM Results를 반환하는 거래 시작 단계다."
      },
      {
        layout: "cards2",
        title: "Modified Terminal Type",
        cards: [
          { title: "기본 Terminal Type — 9F35", items: ["1. Online / Offline Capability", "2. Attended / Unattended 환경", "3. Terminal의 기본 거래 성격"] },
          { title: "Contactless Reader Capabilities — 9F6D", items: ["1. EMV / Mag-Stripe 지원 여부", "2. CVM Required 여부"] }
        ],
        note: "Modified Terminal Type은 원본 9F35를 저장값 자체로 변경하는 것이 아니라, GPO Command에서 카드에 전달하는 거래용 파생값이다."
      },
      {
        layout: "cards2",
        title: "Enhanced Contactless Reader Capabilities",
        cards: [
          { title: "주요 역할", items: ["1. Reader가 지원하는 Contactless Mode 보완", "2. Mobile Transaction 관련 Capability 전달", "3. Delayed Authorisation 지원 표시", "4. CVM Required 상태, Contactless 특성 전달"] },
          { title: "GPO에서의 의미", items: ["1. 카드가 9F6E를 PDOL에서 요청하면 Reader는 해당 거래 상태를 반영한 값을 제공", "2. AIP, Card Interface and Payment Capabilities, Reader Configuration과 함께 사용", "3. Mode·Mobile·Delayed Authorisation 지원 여부 판단에 사용"] }
        ],
        note: "9F6E는 단순 Capability Tag가 아니라, 거래별 Reader 상태를 카드에 알리는 핵심 입력이다."
      },
      {
        layout: "cards3",
        title: "AFL과 Read Application Data",
        cards: [
          { title: "READ RECORD로 수집하는 데이터", items: ["1. CDOL1, CVM List", "2. IAC, AUC, 유효기간", "3. Issuer / ICC 인증서", "4. Mag-Stripe Mode의 Track 2 Equivalent Data", "5. Track 1 / Track 2 Discretionary Data"] },
          { title: "검증 항목", items: ["1. Response Template 70", "2. 필수 Tag 존재 여부", "3. Tag 중복 여부", "4. Tag 길이와 형식"] },
          { title: "AFL이 지정하는 정보", items: ["1. SFI", "2. 시작 Record", "3. 종료 Record", "4. ODA 대상 Record 여부"] }
        ],
        note: "Read Application Data는 이후 ODA, CVM, Risk Management, Action Analysis의 입력을 준비하는 단계다."
      },
      {
        layout: "cards3",
        title: "Offline Data Authentication",
        cards: [
          { title: "SDA", items: ["1. 정적 Application Data의 서명 검증", "2. 카드 데이터 변조 여부 확인"] },
          { title: "CDA", items: ["1. GENERATE AC의 SDAD 검증", "2. Dynamic Data와 AC를 서명", "3. 카드 인증과 거래 Cryptogram 검증 결합"] },
          { title: "CAPK 체인", items: ["1. Scheme CA Public Key", "2. Issuer Public Key", "3. ICC Public Key", "4. 인증서, PAN, 유효기간, Hash, Revocation List 검증"] }
        ],
        note: "CDA는 READ RECORD로 수집한 인증서·정적 데이터와 1st GENERATE AC 응답의 SDAD를 결합해 카드와 거래를 함께 검증한다."
      },
      {
        layout: "cards2",
        title: "Dynamic Reader Limits",
        cards: [
          { title: "핵심 Limit", items: ["1. Reader Contactless Transaction Limit", "2. Reader CVM Required Limit", "3. Reader Contactless Floor Limit"] },
          { title: "의미", items: ["1. Limit은 단순 금액 비교값이 아니다.", "2. AID, 거래 금액, 거래 유형, Terminal Configuration에 따라 결정된다.", "3. 선택된 Dynamic Limit Set이 거래 경로를 바꾼다."] }
        ],
        note: "Dynamic Reader Limits는 AMEX가 Contactless 거래 정책을 거래별로 적용하는 핵심 장치다."
      },
      {
        layout: "cards3",
        title: "Processing Restrictions",

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;");
    }

    function linesToHtml(text) {
      return escapeHtml(text).replaceAll("\n", "<br>");
    }

    function renderPanel(card, extraClass = "") {
      const items = (card.items || []).map((item) => `<div class="item">${linesToHtml(item)}</div>`).join("");
      return `
        <div class="panel centered ${extraClass}">
          <div class="panel-title ${card.boldTitle ? "bold" : ""}">${linesToHtml(card.title)}</div>
          <div class="panel-items ${card.align === "center" ? "center" : "left"}">${items}</div>
        </div>
      `;
    }

    function renderTitle(slide) {
      return `
        <section class="slide title-slide">

          <div class="title-card">
            <div class="slide-title">${escapeHtml(slide.title)}</div>
            <div class="slide-subtitle">${escapeHtml(slide.subtitle)}</div>
            <table class="author-table">
              <tr>
                <td class="author-name">${escapeHtml(slide.author)}</td>
                <td>${escapeHtml(slide.email)}</td>

            </table>
          </div>
        </section>
      `;
    }

    function renderTableOnly(slide) {
      return `
        <section class="slide">
          <div class="top-rule"></div>
          <div class="slide-title small">${escapeHtml(slide.title)}</div>
          <div class="table-layout">
            <table class="main-table">
              <thead>
                <tr>${slide.table.head.map((head) => `<th>${escapeHtml(head)}</th>`).join("")}</tr>
              </thead>
              <tbody>
                ${slide.table.body.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}
              </tbody>
            </table>
          </div>
          ${slide.note ? `<div class="note-box bottom-note">${escapeHtml(slide.note)}</div>` : ""}
        </section>
      `;
    }

    function renderCodeSplit2(slide) {
      return `
        <section class="slide">
          <div class="top-rule"></div>
          <div class="slide-title xsmall">${escapeHtml(slide.title)}</div>
          <div class="code-layout">
            <pre class="code-box">${escapeHtml(slide.code.join("\n"))}</pre>
            <div class="stack-right">
              ${slide.rightBoxes.map((box) => `
                <div class="small-box">
                  <div>
                    <span class="title">${escapeHtml(box.title)}</span><br>
                    ${linesToHtml(box.text)}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderCodeSplit1(slide) {
      return `
        <section class="slide">
          <div class="top-rule"></div>
          <div class="slide-title xsmall">${escapeHtml(slide.title)}</div>
          <div class="code-layout two-right">
            <pre class="code-box">${escapeHtml(slide.code.join("\n"))}</pre>
            <div class="small-box">
              <div>
                <span class="title">${escapeHtml(slide.rightBox.title)}</span><br>
                ${linesToHtml(slide.rightBox.text)}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderCodeSplitBullet(slide) {
      return `
        <section class="slide">
          <div class="top-rule"></div>
          <div class="slide-title xsmall">${escapeHtml(slide.title)}</div>
          <div class="code-layout two-right">
            <pre class="code-box">${escapeHtml(slide.code.join("\n"))}</pre>
            <div class="small-box">
              <div style="text-align:left; width:100%;">
                ${slide.bullets.map((bullet) => `<div style="margin: 8px 0; font-size: 22px; line-height: 1.18;">${bullet}</div>`).join("")}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderSlide(slide) {
      switch (slide.layout) {
        case "title": return renderTitle(slide);
        case "bulletHero": return renderBulletHero(slide);
        case "cards3": return renderCards3(slide);
        case "cards2": return renderCards2(slide);
        case "flow3x3": return renderFlow3x3(slide);
        case "decisionTable": return renderDecisionTable(slide);
        case "leftStackRightStack": return renderLeftStackRightStack(slide);
        case "summary5": return renderSummary5(slide);
        case "tableOnly": return renderTableOnly(slide);
        case "codeSplit2": return renderCodeSplit2(slide);
        case "codeSplit1": return renderCodeSplit1(slide);
        case "codeSplitBullet": return renderCodeSplitBullet(slide);
        default: return `<section class="slide"><div class="top-rule"></div><div class="slide-title small">${escapeHtml(slide.title || "")}</div></section>`;
      }
    }

    function showSlide(index) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, index));
      root.innerHTML = renderSlide(slides[currentIndex]);
      document.title = `AMEX ${currentIndex + 1}/${slides.length}`;
    }

    function updateScale() {
      const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
      stage.style.setProperty("--scale", String(scale));
      stage.style.transform = `scale(${scale})`;
    }

    window.__amexDeck = {
      goTo(index) {
        showSlide(index);
      },
      next() {
        showSlide(currentIndex + 1);
      },
      prev() {
        showSlide(currentIndex - 1);
      },
      get index() {
        return currentIndex;
      },
      get total() {
        return slides.length;
      }
    };

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        showSlide(currentIndex - 1);
      }
      if (event.key === "ArrowRight") {
        event.preventDefault();
        showSlide(currentIndex + 1);
      }
    });

    function syncFromLocation() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = Number.parseInt(params.get("slide") || "", 10);
      if (Number.isFinite(fromQuery) && fromQuery >= 1 && fromQuery <= slides.length) {
        showSlide(fromQuery - 1);
        return;
      }
      const raw = window.location.hash.replace("#", "").trim();
      const parsed = Number.parseInt(raw, 10);
      if (Number.isFinite(parsed) && parsed >= 1 && parsed <= slides.length) {
        showSlide(parsed - 1);
      }
    }

    window.addEventListener("resize", updateScale);
    window.addEventListener("hashchange", syncFromLocation);
    updateScale();
    syncFromLocation();
    if (!window.location.hash && !new URLSearchParams(window.location.search).has("slide")) {
      showSlide(0);
    }
  </script>
</body>
</html>
